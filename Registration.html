<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoadLink</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ROLE -->
<div id="role" class="screen active">
  <h2>Who are you?</h2>

  <div class="role-grid">
    <button class="role-tile driver" onclick="selectRole('driver')">
      <span>🚚</span>Driver
    </button>

    <button class="role-tile fleet" onclick="selectRole('fleet')">
      <span>🚛 🚛 🚛</span>Fleet Owner
    </button>

    <button class="role-tile agent" onclick="selectRole('agent')">
      <span>🤝</span>Agent
    </button>

    <button class="role-tile company" onclick="selectRole('company')">
      <span>🏢</span>Company
    </button>

    <button class="role-tile shipper" onclick="selectRole('shipper')">
      <span>📦</span>Shipper
    </button>
  </div>
</div>

<!-- REGISTER -->
<div id="register" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">⬅</button>
  </div>

  <h2 id="title"></h2>
  <div id="form"></div>

  <button class="main" onclick="submitForm()">Submit</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <br>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<style>
/* SAME CSS - UNCHANGED */
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
}
.screen { display: none; padding: 20px; text-align: center; }
.active { display: block; }
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 50px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.back-btn {
  background: none;
  border: none;
  font-size: 20px;
}
#register { padding-top: 60px; }
.role-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 10px;
}
@media (min-width: 600px) {
  .role-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
.role-tile {
  aspect-ratio: 1;
  border-radius: 16px;
  color: white;
  font-weight: bold;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 8px;
  border: none;
}
.role-tile span { font-size: 28px; }
.driver { background: linear-gradient(45deg,#ff7e5f,#feb47b); }
.fleet { background: linear-gradient(45deg,#43cea2,#185a9d); }
.agent { background: linear-gradient(45deg,#667eea,#764ba2); }
.company { background: linear-gradient(45deg,#f7971e,#ffd200); }
.shipper { background: linear-gradient(45deg,#00c6ff,#0072ff); }
input, select {
  width: 90%;
  padding: 10px;
  margin: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
.search-box {
  width: 90%;
  padding: 10px;
  margin: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
.dropdown-list {
  width: 90%;
  max-height: 150px;
  overflow-y: auto;
  margin: auto;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: white;
  display: none;
  text-align: left;
}
.dropdown-item {
  padding: 10px;
  cursor: pointer;
}
.dropdown-item:hover { background: #f0f0f0; }
.main {
  padding: 12px;
  background: black;
  color: white;
  border-radius: 10px;
  width: 85%;
  border: none;
}
.upload-btn {
  width: 90%;
  padding: 12px;
  margin: 6px;
  border-radius: 8px;
  border: 1px dashed #555;
  background: #fff;
}
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 85%;
}
.digi-btn {
  background: #0B5ED7;
  color: white;
  padding: 12px;
  border-radius: 8px;
  border: none;
  width: 100%;
}
</style>

<script>
/* SAME JS - ONLY UPDATED openModal */

function openModal(type){
  let body = document.getElementById("modalBody");
  let title = document.getElementById("modalTitle");

  if(type === "gov"){
  title.innerText = "Upload Govt ID";
  body.innerHTML = `
    <input type="file" accept="application/pdf">
    <p><b>OR</b></p>
    <button class="digi-btn">📘 Fetch from DigiLocker</button>
  `;
}

  if(type === "photo"){
    title.innerText = "Upload Photo";
    body.innerHTML = `<input type="file" accept="image/*">`;
  }
if(type === "companyId"){
  title.innerText = "Upload Company Issued ID";
  body.innerHTML = `
    <input type="file" accept="application/pdf">
    <p style="font-size:12px;">Upload company ID card or authorization document</p>
  `;
}

  document.getElementById("modal").style.display = "flex";
}
</script>
