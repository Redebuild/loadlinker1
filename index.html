<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadLinker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <img src="logo.png"="" alt="LoadLinker Logo" class="logo">

        <!-- Loading dots -->
        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html><style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #ffffff;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Center */
.container {
    text-align: center;
}

/* Logo */
.logo {
    width: 280px;
    max-width: 90%;
    margin-bottom: 25px;
}

/* Loader */
.loader {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.loader span {
    width: 12px;
    height: 12px;
    background: #ff6600;
    border-radius: 50%;
    animation: bounce 0.6s infinite alternate;
}

.loader span:nth-child(2) {
    animation-delay: 0.2s;
}

.loader span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes bounce {
    from {
        transform: translateY(0);
        opacity: 0.5;
    }
    to {
        transform: translateY(-10px);
        opacity: 1;
    }
}</style><script>setTimeout(() => {
    window.location.href = "registration.html";
}, 3000);</script>
